version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build: .
    container_name: secureshare-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      SHARE_ACCESS_SECRET: ${SHARE_ACCESS_SECRET}
      MASTER_KEY: ${MASTER_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET}
      CLIENT_URL: ${CLIENT_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    depends_on:
      clamav:
        condition: service_healthy
    networks:
      - secureshare

  # ── Frontend SPA ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: secureshare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - secureshare

  # ── ClamAV virus scanner ─────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: secureshare-clamav
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
    networks:
      - secureshare
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  clamav-db:

networks:
  secureshare:
    driver: bridge
